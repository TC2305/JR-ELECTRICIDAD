<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JR Electricidad S.R.L</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <!-- Franja azul solo para la imagen -->
  <div class="banner">
    <img src="JR.2.png" alt="Logo JR Servicios Eléctricos" class="img-logo">
  </div>
  <header>
    <nav class="nav-back">
      <ul class="nav-back">
          <li class="menu-back">
          <a href="#" onclick="history.back(); return false;">Volver atrás</a>
        </li>
      </ul>
    </nav>
  </header>

<main class="container">

    <h3 style="text-align: center; margin-top: 30px;">
      JR ELECTRICIDAD S.R.L – CONTROL DE FACTURAS
    </h3>

    <!-- CARD: FILTROS -->
    <div class="card">
      <div class="form-grid">

        <div class="field">
          <label>Cliente</label>
          <input type="text" id="txtCliente" placeholder="Nombre de la empresa">
        </div>

        <div class="field">
          <label>Estado</label>
          <select id="selectEstado">
            <option value="">Todos</option>
            <option value="pendiente_pago">Pendiente de pago</option>
            <option value="pagada">Pagada</option>
          </select>
        </div>

        <div class="field">
          <label>Desde</label>
          <input type="date" id="fechaDesde">
        </div>

        <div class="field">
          <label>Hasta</label>
          <input type="date" id="fechaHasta">
        </div>

      </div>

      <div class="form-actions">
        <button class="btn btn-primary full" id="btnBuscar">
          Consultar
        </button>
      </div>
    </div>

    <!-- CARD: TABLA -->
    <div class="card">
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Factura #</th>
              <th>Fecha emisión</th>
              <th>Fecha límite</th>
              <th>Monto</th>
              <th>Estado</th>
              <th>Días restantes</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyFacturas">
            <!-- JS inserta aquí -->
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script type="module" src="./app_facturas.js"></script>

</body>
</html>
