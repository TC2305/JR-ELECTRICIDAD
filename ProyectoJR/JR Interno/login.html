<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR Electricidad S.R.L</title>
    <link rel="stylesheet" href="estilos.css">
  </head>
  <body>
     <!-- <button class="btn" onclick="activarEstilos()">Ver antes / después</button>-->
  <main>
  <!-- Franja azul solo para la imagen -->
  <div class="banner">
    <img src="JR.2.png" alt="Logo JR Servicios Eléctricos" class="img-logo">
  </div>

  <!-- Texto fuera de la franja azul -->
  <header class="title">
    <h1>JR Electricidad S.R.L</h1>
  </header>
</main>
<body>

  <main class="login-container">
    <h2>Acceso al Sistema</h2>

    <form id="formLogin">
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" required />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required />
      </div>

      <button type="submit" class="btn btn-primary">
        Iniciar sesión
      </button>
    </form>

    <p id="loginError" class="error"></p>
  </main>

  <script type="module" src="./login.js"></script>
</body>
</html>
