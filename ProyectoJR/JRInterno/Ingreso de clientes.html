<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JR Electricidad S.R.L</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>


  <div class="banner">
    <img src="JR.2.png" alt="Logo JR Electricidad" class="img-logo">
  </div>

  
  <header>
    <nav class="nav-back">
      <ul class="nav-back">
        <li class="menu-back">
          <a href="#" onclick="history.back(); return false;">Volver atrás</a>
        </li>
      </ul>
    </nav>
  </header>

  
  <main class="container">

    <h3 style="text-align: center; margin-top: 30px;">
      JR ELECTRICIDAD S.R.L – INGRESO DE CLIENTES
    </h3>

    
    <div class="card">
      <h2>Agregar Cliente</h2>

      <div class="form-grid">

        <div class="field">
          <label>Empresa</label>
          <input type="text" id="txtEmpresa" placeholder="Nombre de la empresa">
        </div>

        <div class="field">
          <label>Representante</label>
          <input type="text" id="txtRepresentante" placeholder="Nombre del representante">
        </div>

        <div class="field">
          <label>Correo</label>
          <input type="email" id="txtCorreo" placeholder="Correo electrónico">
        </div>

        <div class="field">
          <label>Teléfono</label>
          <input type="text" id="txtTelefono" placeholder="Teléfono">
        </div>

        <div class="field">
          <label>Dirección</label>
          <input type="text" id="txtDireccion" placeholder="Dirección">
        </div>

        <div class="field">
          <label>Fecha inicio</label>
          <input type="date" id="txtFechaInicio">
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn" id="btnAdd">Guardar</button>
        <button type="button" class="btn" id="btnCancel">Cancelar</button>
      </div>
    </div>

   
    <div class="card">
      <input
        type="text"
        id="txtSearch"
        class="search-input"
        placeholder="Buscar cliente por empresa o representante">
      <button type="button" class="btn" id="btnLoad">Consultar</button>
    </div>

    
    <div class="card">
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Empresa</th>
              <th>Representante</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyClientes">
            <!-- Clientes cargados desde JS -->
          </tbody>
        </table>
      </div>
    </div>

  </main>


   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="./app_clientes.js"></script>
 
</body>
</html>
